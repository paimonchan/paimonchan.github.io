<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/og-image.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO — tokens are filled by the prerender build step -->
    <title>%%TITLE%%</title>
    <meta name="description" content="%%DESCRIPTION%%" />
    <meta name="keywords" content="%%KEYWORDS%%" />
    <meta name="author" content="Paimon" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#131110" />
    <meta http-equiv="content-language" content="en" />
    <link rel="canonical" href="%%CANONICAL%%" />
    <link rel="alternate" href="%%CANONICAL%%" hreflang="x-default" />
    <link rel="alternate" href="%%CANONICAL%%" hreflang="en" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Paimon" />
    <meta property="og:title" content="%%TITLE%%" />
    <meta property="og:description" content="%%DESCRIPTION%%" />
    <meta property="og:url" content="%%CANONICAL%%" />
    <meta property="og:image" content="%%OG_IMAGE%%" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="%%OG_IMAGE_ALT%%" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="%%TITLE%%" />
    <meta name="twitter:description" content="%%DESCRIPTION%%" />
    <meta name="twitter:image" content="%%OG_IMAGE%%" />
    <meta name="twitter:image:alt" content="%%OG_IMAGE_ALT%%" />

    <!-- Performance: preconnect to font origin -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <!--
      Hide prerendered SEO content from sighted users to prevent FOUC.
      Crawlers still read it (it's in the DOM, not hidden from bots).
      React replaces the content on mount — no more flash between "plain text
      fallback" and the real app.
    -->
    <style>
      #root > .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0,0,0,0);
        white-space: nowrap;
        border-width: 0;
      }
    </style>

    <!-- JSON-LD structured data (filled by prerender) -->
    <script type="application/ld+json">%%JSONLD%%</script>
    <script type="application/ld+json">%%BREADCRUMBLD%%</script>
  </head>
  <body>
    <div id="root"><div class="sr-only">%%PRERENDER_BODY%%</div></div>

    <!--
      Fallback for crawlers/bots that don't execute JavaScript. Provides
      keyword-rich, crawlable content so the SPA's empty root isn't a blank page.
      Hidden from sighted users; visible to machines.
    -->
    <noscript>
      <div style="max-width:680px;margin:2rem auto;padding:1.5rem;font-family:system-ui,sans-serif;color:#1a1a1a">
        %%NOSCRIPT%%
      </div>
    </noscript>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
