<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/og-image.png" />
    <link rel="apple-touch-icon" href="/og-image.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="apple-mobile-web-app-title" content="paimonchan.io" />

    <!-- Primary SEO - tokens are filled by the prerender build step -->
    <title>%%TITLE%%</title>
    <meta name="description" content="%%DESCRIPTION%%" />
    <meta name="keywords" content="%%KEYWORDS%%" />
    <meta name="author" content="paimonchan" />
    <meta name="application-name" content="paimonchan.io" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" content="#0c0b09" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f7f5f1" media="(prefers-color-scheme: light)" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta http-equiv="content-language" content="en" />
    <meta http-equiv="x-ua-compatible" content="IE=edge" />
    <link rel="canonical" href="%%CANONICAL%%" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="paimonchan.io" />
    <meta property="og:title" content="%%TITLE%%" />
    <meta property="og:description" content="%%DESCRIPTION%%" />
    <meta property="og:url" content="%%CANONICAL%%" />
    <meta property="og:image" content="%%OG_IMAGE%%" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="%%OG_IMAGE_ALT%%" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="%%TITLE%%" />
    <meta name="twitter:description" content="%%DESCRIPTION%%" />
    <meta name="twitter:image" content="%%OG_IMAGE%%" />
    <meta name="twitter:image:alt" content="%%OG_IMAGE_ALT%%" />

    <!-- Performance: preconnect to font origin -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!--
      Inline theme script: read saved preference before React mounts.
      Must run before paint to prevent dark/light flash. Falls back to
      'dark' (the default) when nothing is saved or JSON is corrupt.
    -->
    <script>
      (function() {
        try {
          var raw = localStorage.getItem('paimon.gateway.theme');
          if (raw) {
            var parsed = JSON.parse(raw);
            if (parsed && parsed.state && parsed.state.theme === 'light') {
              document.documentElement.classList.remove('dark');
            }
          }
        } catch(e) {}
      })();
    </script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <!--
      Hide prerendered SEO content from sighted users to prevent FOUC.
      Crawlers still read it (it's in the DOM, not hidden from bots).
      React replaces the content on mount - no more flash between "plain text
      fallback" and the real app.
    -->
    <style>
      #root > .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0,0,0,0);
        white-space: nowrap;
        border-width: 0;
      }
      /* Skip-to-content link: invisible until focused via keyboard. */
      .skip-link {
        position: absolute;
        left: 0.5rem;
        top: -3rem;
        z-index: 100;
        border-radius: 0.375rem;
        background: var(--color-honey-400, #e7ac34);
        color: #131110;
        padding: 0.5rem 0.875rem;
        font-family: 'Inter', system-ui, sans-serif;
        font-size: 0.8125rem;
        font-weight: 600;
        transition: top 0.15s ease-out;
      }
      .skip-link:focus {
        top: 0.5rem;
      }
    </style>

    <!-- JSON-LD structured data (filled by prerender) -->
    <script type="application/ld+json">%%JSONLD%%</script>
    <script type="application/ld+json">%%BREADCRUMBLD%%</script>

    <!-- Umami Analytics — privacy-first, no cookies, self-hosted data -->
    <script defer src="https://cloud.umami.is/script.js" data-website-id="29da9add-2cb8-4c31-b134-99dfad0ab64e"></script>
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>
    <div id="root"><div class="sr-only">%%PRERENDER_BODY%%</div></div>

    <!--
      Fallback for crawlers/bots that don't execute JavaScript. Provides
      keyword-rich, crawlable content so the SPA's empty root isn't a blank page.
      Hidden from sighted users; visible to machines.
    -->
    <noscript>
      <div style="max-width:680px;margin:2rem auto;padding:1.5rem;font-family:system-ui,sans-serif;color:#1a1a1a">
        %%NOSCRIPT%%
      </div>
    </noscript>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
