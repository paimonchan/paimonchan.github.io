<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eec35a" />
      <stop offset="0.5" stop-color="#e7ac34" />
      <stop offset="1" stop-color="#d9911e" />
    </linearGradient>
    <radialGradient id="bg" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0" stop-color="#1d1a16" />
      <stop offset="1" stop-color="#0c0b09" />
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- dotted grid -->
  <g fill="#2e2a24">
    <circle cx="40" cy="40" r="1.5" /><circle cx="120" cy="40" r="1.5" /><circle cx="200" cy="40" r="1.5" />
  </g>

  <!-- Brand glyph tile -->
  <rect x="80" y="160" width="120" height="120" rx="28" fill="url(#g)" />
  <g fill="none" stroke="#131110" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" transform="translate(80 160)">
    <circle cx="55" cy="60" r="28" />
    <path d="M75 45 L92 28 M92 28 L75 28 M92 28 L92 45" />
  </g>

  <!-- Wordmark -->
  <text x="240" y="250" font-family="'Space Grotesk', 'Inter', sans-serif" font-size="72" font-weight="700" fill="#f7f5f1">Paimon</text>
  <text x="240" y="300" font-family="'Inter', sans-serif" font-size="24" fill="#8a8074">a hub of io projects</text>

  <!-- Hairline -->
  <line x1="80" y1="370" x2="1120" y2="370" stroke="#2e2a24" stroke-width="1" />

  <!-- Tagline -->
  <text x="80" y="430" font-family="'Space Grotesk', sans-serif" font-size="34" font-weight="600" fill="#f4d98a">Tools &amp; apps, all in one place.</text>
  <text x="80" y="478" font-family="'Inter', sans-serif" font-size="22" fill="#b8ad9c">paimonchan.github.io</text>
